<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>レシートバーコード診断</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.12.1/dist/quagga.min.js"></script>
</head>

<body>
  <main id="scannerPage">

    <section id="cameraStage" class="cameraStage">

      <video
        id="cameraVideo"
        autoplay
        muted
        playsinline
      ></video>

      <div class="cameraShade"></div>

      <header class="topBar">
        <h1>レシートバーコード診断</h1>
        <p>バーコードだけを細い枠の中へ合わせてください</p>
      </header>

      <div id="scanFrame" class="scanFrame">
        <span class="corner topLeft"></span>
        <span class="corner topRight"></span>
        <span class="corner bottomLeft"></span>
        <span class="corner bottomRight"></span>
        <span class="scanLine"></span>
      </div>

      <div id="cameraStatus" class="cameraStatus">
        カメラ停止中
      </div>

    </section>

    <section class="diagnosticPanel">

      <div class="statusCard">
        <div class="sectionTitle">現在の状態</div>

        <div id="statusText" class="mainStatus">
          「カメラを起動」を押してください
        </div>
      </div>

      <div class="statsGrid">

        <div class="statItem">
          <span class="statLabel">カメラ</span>
          <strong id="cameraState">停止</strong>
        </div>

        <div class="statItem">
          <span class="statLabel">解像度</span>
          <strong id="resolutionText">―</strong>
        </div>

        <div class="statItem">
          <span class="statLabel">取得回数</span>
          <strong id="captureCount">0</strong>
        </div>

        <div class="statItem">
          <span class="statLabel">解析回数</span>
          <strong id="decodeCount">0</strong>
        </div>

        <div class="statItem">
          <span class="statLabel">文字列候補</span>
          <strong id="candidateCount">0</strong>
        </div>

        <div class="statItem">
          <span class="statLabel">全方式失敗</span>
          <strong id="failureCount">0</strong>
        </div>

      </div>

      <div class="previewCard">

        <div class="sectionTitle">
          ① 生画像
        </div>

        <canvas id="rawPreview"></canvas>

        <div class="sectionTitle previewTitle">
          ② グレースケール＋コントラスト
        </div>

        <canvas id="grayPreview"></canvas>

        <div class="sectionTitle previewTitle">
          ③ 二値化
        </div>

        <canvas id="binaryPreview"></canvas>

        <div id="cropInfo" class="cropInfo">
          まだ画像を取得していません
        </div>

      </div>

      <div class="candidateCard">
        <div class="sectionTitle">直近の読取候補</div>

        <div id="candidateText" class="candidateText">
          未検出
        </div>
      </div>

      <details class="logCard">
        <summary>診断ログを表示</summary>
        <pre id="logText">待機中</pre>
      </details>

      <section id="resultPanel" class="resultPanel hidden">
        <div class="successTitle">
          バーコード読み取り完了！
        </div>

        <div id="resultText"></div>
      </section>

    </section>

    <canvas id="captureCanvas"></canvas>
    <canvas id="grayCanvas"></canvas>
    <canvas id="binaryCanvas"></canvas>

    <footer class="bottomBar">

      <button id="startButton" type="button">
        カメラを起動
      </button>

      <button
        id="stopButton"
        type="button"
        class="secondary hidden"
      >
        停止
      </button>

      <a
        class="photoButton"
        href="decode-test.html"
      >
        写真から読む
      </a>

    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
