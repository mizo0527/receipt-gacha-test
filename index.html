<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>レシートバーコード読取</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.12.1/dist/quagga.min.js"></script>
</head>

<body>
  <main id="scannerPage">

    <video
      id="cameraVideo"
      autoplay
      muted
      playsinline
    ></video>

    <canvas id="captureCanvas"></canvas>

    <div class="shade shadeTop"></div>
    <div class="shade shadeBottom"></div>

    <header class="topBar">
      <h1>レシートガチャ</h1>
      <p>レシート下部のバーコードを読み取ります</p>
    </header>

    <section class="scannerGuide">

      <div id="scanFrame" class="scanFrame">
        <span class="corner topLeft"></span>
        <span class="corner topRight"></span>
        <span class="corner bottomLeft"></span>
        <span class="corner bottomRight"></span>
        <span class="scanLine"></span>
      </div>

      <div id="statusText" class="statusText">
        「カメラを起動」を押してください
      </div>

      <div id="debugText" class="debugText">
        待機中
      </div>

    </section>

    <section id="resultPanel" class="resultPanel hidden">
      <div class="successTitle">
        バーコード読み取り完了！
      </div>

      <div id="resultText"></div>
    </section>

    <footer class="bottomBar">

      <button id="startButton" type="button">
        カメラを起動
      </button>

      <button
        id="stopButton"
        type="button"
        class="secondary hidden"
      >
        停止
      </button>

      <a
        class="photoButton"
        href="decode-test.html"
      >
        写真から読む
      </a>

    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
